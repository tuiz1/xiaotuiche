title: 小推车的学习博客
description: 记录我的学习历程和心得体会
baseurl: "" # 如果你的仓库名是 username.github.io，这里留空；否则填仓库名
url: "https://你的用户名.github.io" # 替换为你的 GitHub 用户名

theme: minima

# 构建设置
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 作者信息
author:
  name: 小推车
  email: your-email@example.com

# 社交链接（可选）
social_links:
  github: 你的GitHub用户名
  twitter: 你的Twitter用户名

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - .cache/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - .git/
  - .gitignore
